<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situación Financiera</title>
    
    <!-- Añadimos las variables CSS con colores HSL más vivos (saturados) -->
    <style>
        :root {
            --cat-mejora: 126, 45%, 52%;       /* Verde */
            --cat-reinsercion: 215, 14%, 55%;  /* Plomo/Gris */
            --cat-deudas: 30, 50%, 45%;        /* Marrón claro */
            --cat-negociacion: 5, 75%, 54%;    /* Rojo */
        }
    </style>

    <!-- Incluimos Tailwind CSS para los estilos rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración de colores conectados a nuestras variables HSL
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cat-mejora': 'hsl(var(--cat-mejora))',
                        'cat-reinsercion': 'hsl(var(--cat-reinsercion))',
                        'cat-deudas': 'hsl(var(--cat-deudas))',
                        'cat-negociacion': 'hsl(var(--cat-negociacion))',
                        'brand-bg': '#F4F7F8',
                        'brand-info-bg': '#EBF3FB',
                        'brand-info-text': '#2E69AD',
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex items-center justify-center p-4 relative">

    <!-- Botón flotante para editar -->
    <button id="btn-editar" class="fixed bottom-6 right-6 bg-brand-info-text text-white p-4 rounded-full shadow-xl hover:bg-blue-800 hover:scale-105 transition-all z-40 group flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
        </svg>
        <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-500 ease-in-out font-medium">Actualizar Datos</span>
    </button>

    <!-- Ventana Modal (Oculta por defecto) -->
    <div id="modal-config" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl transform transition-transform scale-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Actualizar Datos</h2>
                <button id="btn-cerrar-x" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre</label>
                    <input type="text" id="input-nombre" class="block w-full rounded-lg border-gray-300 bg-gray-50 border p-3 text-gray-800 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none" placeholder="Ingresa el nombre">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Score</label>
                    <input type="number" id="input-score" class="block w-full rounded-lg border-gray-300 bg-gray-50 border p-3 text-gray-800 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none" min="0" max="999" placeholder="Ej: 818">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Situación del Usuario</label>
                    <select id="input-situacion" class="block w-full rounded-lg border-gray-300 bg-gray-50 border p-3 text-gray-800 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all outline-none">
                        <option value="normal">Normal</option>
                        <option value="deudas_antiguas">Deudas antiguas</option>
                        <option value="reinsercion">Reinserción</option>
                    </select>
                </div>
            </div>
            <div class="mt-8 flex justify-end space-x-3">
                <button id="btn-cancelar" class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-xl transition-colors">Cancelar</button>
                <button id="btn-guardar" class="px-5 py-2.5 bg-brand-info-text text-white font-medium hover:bg-blue-800 rounded-xl shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Contenedor Principal -->
    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-16 p-4 md:p-8 rounded-2xl">
        
        <!-- COLUMNA IZQUIERDA: Información y Rangos -->
        <div class="flex flex-col space-y-6">
            
            <!-- Lista de Barras de Rangos (Generada por JavaScript) -->
            <div id="lista-rangos" class="space-y-3">
                <!-- El contenido se inyectará aquí con JS -->
            </div>

            <!-- Caja de Información (Foco) -->
            <div class="bg-brand-info-bg rounded-xl p-5 flex items-center md:items-start space-x-4 shadow-sm border border-blue-100 mt-4">
                <div class="text-yellow-500 mt-1 flex-shrink-0">
                    <!-- Icono de Foco (Lightbulb) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                </div>
                <p id="foco-texto" class="text-brand-info-text text-[1.1rem] font-medium leading-snug transition-all duration-300">
                    ¡Tu puntaje Mientras más alto sea, generas confianza en bancos y entidades!
                </p>
            </div>

            <!-- Encabezado (Movido aquí abajo) -->
            <div class="pt-2">
                <h1 class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-3 tracking-tight">Situación Financiera</h1>
                <p class="text-gray-500 text-base md:text-lg leading-relaxed">
                    Es un número que indica la probabilidad de cumplir con tus obligaciones financieras.
                </p>
            </div>
            
        </div>

        <!-- COLUMNA DERECHA: Gráfico y Resumen -->
        <div class="flex flex-col items-center justify-center pt-8 md:pt-0">
            
            <!-- Saludo Dinámico -->
            <div class="text-center mb-8">
                <h2 id="nombre-usuario" class="text-4xl font-extrabold text-gray-800 mb-2">¡Hola!</h2>
                <h3 id="score-texto" class="text-3xl font-bold text-gray-400">
                    Calculando Score...
                </h3>
            </div>

            <!-- Gráfico Circular SVG -->
            <div class="relative w-64 h-64 flex items-center justify-center mb-8">
                <svg class="w-full h-full transform -rotate-90" viewBox="0 0 200 200">
                    <!-- Círculo de fondo (Gris) -->
                    <circle 
                        cx="100" cy="100" r="85" 
                        stroke="#E2E8F0" stroke-width="14" fill="white" 
                        class="shadow-inner"
                    />
                    <!-- Círculo de progreso dinámico -->
                    <circle 
                        id="circulo-progreso"
                        cx="100" cy="100" r="85" 
                        stroke="#CBD5E1" 
                        stroke-width="14" fill="none" 
                        stroke-dasharray="534.07" 
                        stroke-dashoffset="534.07"
                        class="transition-all duration-1000 ease-out"
                    />
                </svg>
                
                <!-- Texto Central del Gráfico -->
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                    <span class="text-gray-500 text-sm font-medium">Tu score es</span>
                    <span id="score-numero" class="text-6xl font-extrabold text-gray-800 tracking-tighter my-1 leading-none">
                        0
                    </span>
                    <span class="text-gray-500 text-sm font-medium">de <span id="score-maximo">999</span></span>
                </div>
            </div>

            <!-- Estado de Calificación -->
            <div class="text-center space-y-4">
                <h4 class="text-xl font-extrabold text-gray-800 tracking-wide">CALIFICACION</h4>
                
                <div id="calificacion-badge" class="inline-block bg-gray-400 text-white font-bold text-xl px-12 py-2 rounded-xl shadow-sm transition-colors duration-500">
                    Normal
                </div>
                
                <p class="text-gray-400 font-medium text-lg mt-4">
                    Verificando..
                </p>
            </div>

        </div>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA DE JAVASCRIPT                       -->
    <!-- ========================================== -->
    <script>
        // VARIABLES DINÁMICAS (Ahora se pueden actualizar)
        let datosUsuario = {
            nombre: "KATIA",
            scoreActual: 818,
            scoreMaximo: 999,
            situacion: "normal" // Opciones: normal, deudas_antiguas, reinsercion
        };

        // Definición de los rangos (Dividimos los 999 puntos en 4 niveles)
        const rangos = [
            { min: 750, max: 999, titulo: 'Puntos de mejora',  colorBg: 'bg-cat-mejora',      colorHex: 'hsl(var(--cat-mejora))' },
            { min: 500, max: 749, titulo: 'Reinserción',       colorBg: 'bg-cat-reinsercion', colorHex: 'hsl(var(--cat-reinsercion))' },
            { min: 250, max: 499, titulo: 'Deudas antiguas',   colorBg: 'bg-cat-deudas',      colorHex: 'hsl(var(--cat-deudas))' },
            { min: 0,   max: 249, titulo: 'Negociación',       colorBg: 'bg-cat-negociacion', colorHex: 'hsl(var(--cat-negociacion))' }
        ];

        // Función principal que dibuja toda la interfaz basada en `datosUsuario`
        function renderizarDashboard() {
            // 1. Encontrar en qué categoría cae el usuario
            const categoriaActual = rangos.find(r => datosUsuario.scoreActual >= r.min && datosUsuario.scoreActual <= r.max) 
                                    || rangos[rangos.length - 1]; // Fallback si hay un error

            // 2. Actualizar el texto del Foquito basado en la situación
            const focoTexto = document.getElementById('foco-texto');
            if (datosUsuario.situacion === 'deudas_antiguas') {
                focoTexto.textContent = "DEUDA MAYOR A 5 AÑOS";
            } else if (datosUsuario.situacion === 'reinsercion') {
                focoTexto.textContent = "YA CANCELO SUS DEUDAS PERO NO ACCEDE A PRESTAMOS";
            } else {
                focoTexto.textContent = "¡Tu puntaje Mientras más alto sea, generas confianza en bancos y entidades!";
            }

            // 3. Generar las barras de la lista izquierda
            const listaRangosContenedor = document.getElementById('lista-rangos');
            listaRangosContenedor.innerHTML = ''; // Limpiamos las anteriores
            
            rangos.forEach(rango => {
                const esActivo = (categoriaActual && categoriaActual.min === rango.min);
                const clasesBorde = esActivo ? 'ring-2 ring-offset-2 ring-offset-brand-bg ring-blue-300 shadow-md' : '';

                const divRango = document.createElement('div');
                divRango.className = `${rango.colorBg} text-white rounded-xl px-4 md:px-6 py-4 md:py-5 flex items-center justify-center shadow-sm transition-all duration-300 hover:scale-[1.04] hover:shadow-lg cursor-pointer ${clasesBorde}`;
                divRango.innerHTML = `
                    <div class="font-bold text-xl md:text-2xl tracking-wide text-center">
                        ${rango.titulo}
                    </div>
                `;
                listaRangosContenedor.appendChild(divRango);
            });

            // 4. Actualizar los textos de la derecha
            document.getElementById('nombre-usuario').textContent = `¡Hola ${datosUsuario.nombre.toUpperCase()}!`;
            document.getElementById('score-maximo').textContent = datosUsuario.scoreMaximo;
            
            // Animación para contar los números del Score
            animarNumeros("score-numero", parseInt(document.getElementById('score-numero').textContent) || 0, datosUsuario.scoreActual, 800);

            if (categoriaActual) {
                // Actualizar título debajo del nombre
                const scoreTexto = document.getElementById('score-texto');
                scoreTexto.textContent = `Tu estado es ${categoriaActual.titulo}`;
                scoreTexto.style.color = categoriaActual.colorHex;

                // Actualizar el color de la pastilla de calificación
                const badge = document.getElementById('calificacion-badge');
                badge.className = `inline-block text-white font-bold text-xl px-12 py-2 rounded-xl shadow-sm transition-colors duration-500 ${categoriaActual.colorBg}`;
            }

            // 5. Lógica matemática para animar el círculo SVG
            const radioCirculo = 85;
            const circunferencia = 2 * Math.PI * radioCirculo; 
            const porcentajeScore = datosUsuario.scoreActual / datosUsuario.scoreMaximo;
            const dashOffset = circunferencia * (1 - Math.max(0, Math.min(porcentajeScore, 1))); 

            const circuloProgreso = document.getElementById('circulo-progreso');
            circuloProgreso.setAttribute('stroke-dasharray', circunferencia);
            
            if (categoriaActual) {
                circuloProgreso.setAttribute('stroke', categoriaActual.colorHex);
            }

            // Reiniciamos y animamos el círculo
            circuloProgreso.setAttribute('stroke-dashoffset', circunferencia);
            setTimeout(() => {
                circuloProgreso.setAttribute('stroke-dashoffset', dashOffset);
            }, 50);
        }

        // Función auxiliar para crear el efecto visual de "conteo" en los números
        function animarNumeros(id, inicio, fin, duracion) {
            if (inicio === fin) {
                document.getElementById(id).textContent = fin;
                return;
            }
            let rango = fin - inicio;
            let actual = inicio;
            let incremento = fin > inicio ? 1 : -1;
            let pasos = Math.min(Math.abs(rango), 60);
            let tiempoPaso = Math.abs(Math.floor(duracion / pasos));
            let obj = document.getElementById(id);
            
            let timer = setInterval(() => {
                actual += incremento * Math.ceil(Math.abs(rango) / pasos);
                if ((incremento > 0 && actual >= fin) || (incremento < 0 && actual <= fin)) {
                    actual = fin;
                    clearInterval(timer);
                }
                obj.textContent = actual;
            }, tiempoPaso);
        }

        // CONTROLADORES DEL MODAL Y EVENTOS
        document.addEventListener("DOMContentLoaded", () => {
            // Renderizado inicial al cargar la página
            renderizarDashboard();

            const modal = document.getElementById('modal-config');
            const btnEditar = document.getElementById('btn-editar');
            const btnCerrarX = document.getElementById('btn-cerrar-x');
            const btnCancelar = document.getElementById('btn-cancelar');
            const btnGuardar = document.getElementById('btn-guardar');

            // Abrir Modal
            btnEditar.addEventListener('click', () => {
                // Cargar datos actuales en los inputs de la ventana
                document.getElementById('input-nombre').value = datosUsuario.nombre;
                document.getElementById('input-score').value = datosUsuario.scoreActual;
                document.getElementById('input-situacion').value = datosUsuario.situacion;
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            });

            // Cerrar Modal
            const cerrarModal = () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            };

            btnCerrarX.addEventListener('click', cerrarModal);
            btnCancelar.addEventListener('click', cerrarModal);

            // Guardar Datos
            btnGuardar.addEventListener('click', () => {
                const nuevoNombre = document.getElementById('input-nombre').value || "USUARIO";
                let nuevoScore = parseInt(document.getElementById('input-score').value) || 0;
                
                // Aseguramos que el score no pase de 999
                nuevoScore = Math.min(999, Math.max(0, nuevoScore)); 
                
                const nuevaSituacion = document.getElementById('input-situacion').value;

                // Actualizamos nuestro estado global
                datosUsuario.nombre = nuevoNombre;
                datosUsuario.scoreActual = nuevoScore;
                datosUsuario.situacion = nuevaSituacion;

                // Re-dibujamos la interfaz
                renderizarDashboard();
                cerrarModal();
            });
        });
    </script>
</body>
</html>
